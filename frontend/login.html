<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fut Store</title>

    <link rel="stylesheet" href="css/login.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div class="bg-effect"></div>

    <header>
        <nav class="navbar">

      <h2 class="logo">Fut Store</h2>

            <ul class="menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="produtos.html">Produtos</a></li>
                <li><a href="login.html">Login</a></li>
                <li href="/carrinho">
                        <i class="fa-solid fa-cart-shopping"></i>
                    </a></li>

<li>
    <button id="toggle-theme" class="theme-btn">
        <i class="fa-solid fa-moon"></i>
    </button>
    </li>
            </ul>

    </nav>
    </header>

    <main>

        <section class="banner-area">
            <div class="banner-content">
                <span class="badge">Loja Oficial</span>

                <h1>A maior loja de futebol do Brasil</h1>

                <p>
                    Camisas oficiais, chuteiras e produtos exclusivos
                    com experiência premium.
                </p>
            </div>
        </section>

        <section class="form-area">

            <form class="login-form" id="formLogin">

                <h1>Bem-vindo</h1>

                <p class="subtitle">Faça login na sua conta</p>

                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" required>
                    <label>Email</label>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="senha" required>
                    <label>Senha</label>
                </div>

                <div class="options">

                    <label class="remember">
                        <input type="checkbox">
                        Lembrar senha
                    </label>

                    <a href="#">Esqueceu a senha?</a>

                </div>

                <button type="submit">
                    Entrar
                </button>

                <div class="social-login">

                    <p>Ou continue com</p>

                    <div class="social-buttons">

                        <button type="button" id="googleLogin">
                            <i class="fa-brands fa-google"></i>
                        </button>

                        <button type="button" id="facebookLogin">
                            <i class="fa-brands fa-facebook-f"></i>
                        </button>

                        <button type="button" id="appleLogin">
                            <i class="fa-brands fa-apple"></i>
                        </button>

                    </div>

                </div>

                <p class="register-link">
                    Não possui conta?
                    <a href="cadastro.html">Criar conta</a>
                </p>

            </form>

        </section>

    </main>

    <script src="js/api.js"></script>
    <script type="module" src="js/auth/login.js"></script>
    <script src="js/navbar.js"></script>

</body>

</html>
