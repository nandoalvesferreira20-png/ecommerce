<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fut Store</title>

    <link rel="stylesheet" href="css/login.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div class="bg-effect"></div>

    <header>
        <nav class="navbar">

      <h2 class="logo">Fut Store</h2>

      <ul class="menu">

        <li>
          <a href="index.html">Home</a>
        </li>

        <li>
          <a href="index.html#produtos">Produtos</a>
        </li>

        <li>
          <a href="feedbacks.html">Feedbacks</a>
        </li>

        <li>
          <a href="cadastro.html">Cadastro</a>
        </li>

        <li>
          <a href="login.html">
            <i class="fa-solid fa-user"></i>
          </a>
        </li>

        <li>
          <a href="/carrinho">
            <i class="fa-solid fa-cart-shopping"></i>
          </a>
        </li>

      </ul>

    </nav>
    </header>

    <main>

        <section class="banner-area">
            <div class="banner-content">
                <span class="badge">Loja Oficial</span>

                <h1>A maior loja de futebol do Brasil</h1>

                <p>
                    Camisas oficiais, chuteiras e produtos exclusivos
                    com experiência premium.
                </p>
            </div>
        </section>

        <section class="form-area">

            <form class="login-form" id="formLogin">

                <h1>Bem-vindo</h1>

                <p class="subtitle">Faça login na sua conta</p>

                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" required>
                    <label>Email</label>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="senha" required>
                    <label>Senha</label>
                </div>

                <div class="options">

                    <label class="remember">
                        <input type="checkbox">
                        Lembrar senha
                    </label>

                    <a href="#">Esqueceu a senha?</a>

                </div>

                <button type="submit">
                    Entrar
                </button>

                <div class="social-login">

                    <p>Ou continue com</p>

                    <div class="social-buttons">

                        <button type="button" id="googleLogin">
                            <i class="fa-brands fa-google"></i>
                        </button>

                        <button type="button" id="facebookLogin">
                            <i class="fa-brands fa-facebook-f"></i>
                        </button>

                        <button type="button" id="appleLogin">
                            <i class="fa-brands fa-apple"></i>
                        </button>

                    </div>

                </div>

                <p class="register-link">
                    Não possui conta?
                    <a href="cadastro.html">Criar conta</a>
                </p>

            </form>

        </section>

    </main>

    <!-- LOGIN GOOGLE -->
    <script type="module">

        import { initializeApp }
        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

        import {
            getAuth,
            GoogleAuthProvider,
            signInWithPopup
        }
        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCfs_qRIeyKRCZpg8oJSb4qMyUgDkOBoqs",
            authDomain: "fut-store.firebaseapp.com",
            projectId: "fut-store",
            storageBucket: "fut-store.firebasestorage.app",
            messagingSenderId: "532114026795",
            appId: "1:532114026795:web:ea97838b6642fed94a156e"
        };

        const app = initializeApp(firebaseConfig);

        const auth = getAuth(app);

        const provider = new GoogleAuthProvider();

        const googleLogin = document.getElementById("googleLogin");

        googleLogin.addEventListener("click", async () => {

            try {

                const resultado = await signInWithPopup(auth, provider);

                const usuario = resultado.user;

                const usuarioLogado = {
                    nome: usuario.displayName,
                    email: usuario.email,
                    foto: usuario.photoURL
                };

                localStorage.setItem(
                    "usuarioLogado",
                    JSON.stringify(usuarioLogado)
                );

                alert("Login com Google realizado!");

                window.location.href = "index.html";

            } catch (erro) {

                console.log("ERRO COMPLETO:", erro);
                console.log("CÓDIGO:", erro.code);
                console.log("MENSAGEM:", erro.message);

                alert(erro.code);
            }

        });

    </script>

    <!-- LOGIN NORMAL -->
    <script>

        const formLogin = document.getElementById("formLogin");

        formLogin.addEventListener("submit", async (event) => {

            event.preventDefault();

            const email = document.getElementById("email").value;

            const senha = document.getElementById("senha").value;

            const resposta = await fetch("http://localhost:3000/login", {
                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({
                    email,
                    senha
                })
            });

            const dados = await resposta.json();

            if (!resposta.ok) {
                alert(dados.erro);
                return;
            }

            localStorage.setItem(
                "usuarioLogado",
                JSON.stringify(dados.usuario)
            );

            alert("Login realizado com sucesso!");

            window.location.href = "index.html";

        });

    </script>

</body>

</html>
