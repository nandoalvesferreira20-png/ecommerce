<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Painel Admin - Fut Store</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/admin.css">

    <!-- ICONS -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <!-- BACKGROUND -->
    <div class="bg-effect"></div>

    <!-- NAVBAR -->
     <header>
  <nav class="navbar">
    <h2 class="logo">Fut Store</h2>

    <ul class="menu">
      <li>
        <a href="index.html">Home</a>
      </li>

      <li>
        <a href="Produtos.html">Produtos</a>
      </li>

      <li>
        <a href="feedback.html">Feedbacks</a>
      </li>

      <li>
        <a href="cadastro.html">Cadastro</a>
      </li>

      <li id="areaUsuario">
        <a href="login.html">
          <i class="fa-solid fa-user"></i>
        </a>
      </li>

      <li>
        <a href="/carrinho">
          <i class="fa-solid fa-cart-shopping"></i>
        </a>
      </li>
    </ul>
  </nav>
</header>

    <!-- MAIN -->
    <main>

        <!-- LEFT -->
        <section class="admin-info">

            <span class="badge">
                Painel Administrativo
            </span>

            <h1>
                Gerencie seus produtos
            </h1>

            <p>
                Cadastre, edite e organize os produtos
                da sua loja com um painel moderno e profissional.
            </p>

        </section>

        <!-- RIGHT -->
        <section class="admin-area">

            <div class="admin-card">

                <h2>Cadastrar Produto</h2>

                <!-- PESQUISA -->
                <div class="search-box">

                    <i class="fa-solid fa-magnifying-glass"></i>

                    <input
                        type="text"
                        placeholder="Pesquisar produto..."
                    >

                </div>

                <!-- NOME -->
                <div class="input-group">

                    <input
                        type="text"
                        id="nome"
                        required
                    >

                    <label>
                        Nome do produto
                    </label>

                </div>

                <!-- PREÇO -->
                <div class="input-group">

                    <input
                        type="number"
                        id="preco"
                        required
                    >

                    <label>
                        Preço
                    </label>

                </div>

                <!-- DESCRIÇÃO -->
                <div class="input-group">

                    <textarea
                        id="descricao"
                        required
                    ></textarea>

                    <label>
                        Descrição do produto
                    </label>

                </div>

                <!-- SELECT -->
                <div class="select-group">

                    <select id="categoria">

                        <option value="">
                            Selecione a categoria
                        </option>

                        <option value="camisetas">
                            Camisetas
                        </option>

                        <option value="chuteiras">
                            Chuteiras
                        </option>

                        <option value="acessorios">
                            Acessórios
                        </option>

                        <option value="promocoes">
                            Promoções
                        </option>

                    </select>

                </div>

                <!-- FILE -->
                <div class="file-upload">

                    <label for="imagens">
                        <i class="fa-solid fa-image"></i>
                        Escolher imagens
                    </label>

                    <input
                        type="file"
                        id="imagens"
                        name="imagens"
                        multiple
                        accept="image/*"
                    >

                </div>

                <!-- BUTTON -->
                <button id="btnSalvar">
                    Salvar Produto
                </button>

            </div>

        </section>

    </main>

    <!-- PRODUTOS -->
    <section class="products-section">

        <h2>Produtos cadastrados</h2>

        <div id="listaProdutos"></div>

    </section>

<script src="js/api.js"></script>
<script src="js/admin/admin.js"></script>
<script src="js/navbar.js"></script>

</body>
</html>
