<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Produto - Fut Store</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/produtos.css">

    <!-- ICONS -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

<script>
    // =========================
        // PRODUTOS
        // =========================

        let listaProdutos = [];

        fetch("http://localhost:3000/produtos")

            .then(res => res.json())

            .then(produtos => {

                listaProdutos = produtos;

                mostrarProdutos(listaProdutos);

            })

            .catch(erro => {

                console.log("Erro ao carregar produtos:", erro);

            });


        function mostrarProdutos(produtos) {

            const container =
                document.getElementById("produtos");

            container.innerHTML = "";

            produtos.forEach((produto, index) => {

                container.innerHTML += `

                    <div class="card-produto">

                        <img
                            src="${produto.imagem}"
                            alt="${produto.nome}"
                        >

                        <h3>${produto.nome}</h3>

                        <p>R$ ${produto.preco}</p>

                        <a href="produto.html?id=${produto.id ?? index}">

                            <button>
                                Ver Produto
                            </button>

                        </a>

                    </div>
                `;
            });
        }

</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</head>

<body>

    <!-- BG EFFECT -->
    <div class="bg-effect"></div>

    <!-- ===================================================== -->
    <!-- ======================= NAVBAR ====================== -->
    <!-- ===================================================== -->

    <header>

        <nav class="navbar">

            <!-- LOGO -->
            <h2 class="logo">
                Fut Store
            </h2>

            <!-- MENU -->
            <ul class="menu">

                <li>
                    <a href="index.html">
                        Home
                    </a>
                </li>

                <li>
                    <a href="produto.html">
                        Produtos
                    </a>
                </li>

                <li>
                    <a href="cadastro.html">
                        Cadastro
                    </a>
                </li>

                <!-- USER -->
                <li>
                    <a href="login.html">
                        <i class="fa-solid fa-user"></i>
                    </a>
                </li>

                <!-- CARRINHO -->
                <li>
                    <a href="/carrinho">
                        <i class="fa-solid fa-cart-shopping"></i>
                    </a>
                </li> 

            </ul>

        </nav>

    </header>

    <!-- ===================================================== -->
    <!-- ======================== MAIN ======================= -->
    <!-- ===================================================== -->

    <main>

       <div class="container py-5">
        <h1 class="text-center mb-4">Produtos</h1>

        <div class="row" id="lista-produtos">
            
        </div>
    </div>

    <script>
       
        fetch("http://localhost:3000/produtos")
              .then(response => response.json())
        .then(produtos => {
            const container = document.getElementById("lista-produtos");

            produtos.forEach(produto => {
                const card = `
                    <div class="col-md-3 mb-4">
                        <div class="card h-100 shadow-sm">

                            <img src="${produto.imagem}" class="card-img-top" alt="${produto.nome}">

                            <div class="card-body">
                                <h5 class="card-title">${produto.nome}</h5>
                                <p class="card-text">${produto.descricao}</p>
                                <p class="fw-bold text-success">R$ ${produto.preco}</p>

                                <div class="d-flex gap-2 mt-3">

                                    <!-- Botão Ver produto -->
                                    <a href="produto.html?id=${produto.id}" class="btn btn-primary w-50">
                                        <i class="bi bi-eye"></i> Ver
                                    </a>

                                    <!-- Botão Carrinho -->
                                    <button class="btn btn-success w-50">
                                        <i class="bi bi-cart-plus"></i> Comprar
                                    </button>

                                </div>
                            </div>

                        </div>
                    </div>
                `;

                container.innerHTML += card;
            });
        })
        .catch(error => console.error("Erro ao carregar JSON:", error));
</script>

    <!-- Link do BootStrao (não apagar) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


    </main>

    <!-- ===================================================== -->
    <!-- ======================= FOOTER ====================== -->
    <!-- ===================================================== -->

    <footer>

        <p>
            © Fut Store - Todos os direitos reservados
        </p>

    </footer>

</body>

</html>
