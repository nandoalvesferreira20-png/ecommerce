<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Produto - Fut Store</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/produtos.css">

    <!-- ICONS -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</head>

<body>

    <!-- BG EFFECT -->
    <div class="bg-effect"></div>

    <!-- NAVBAR -->
    <header>
        <nav class="navbar">
            <h2 class="logo">Fut Store</h2>

            <ul class="menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="produto.html">Produtos</a></li>
                <li><a href="cadastro.html">Cadastro</a></li>

                <li><a href="login.html"><i class="fa-solid fa-user"></i></a></li>
                <li><a href="/carrinho"><i class="fa-solid fa-cart-shopping"></i></a></li>
            </ul>
        </nav>
    </header>

    <!-- MAIN -->
    <main>

        <div class="container py-5">
            <h1 class="text-center mb-4" style="color: white;">Produtos</h1>

            <!-- LISTA DE PRODUTOS -->
            <div class="row" id="lista-produtos"></div>

            <!-- PAGINAÇÃO -->
            <div id="paginacao" class="d-flex justify-content-center mt-4"></div>

        </div>

    </main>

    <!-- FOOTER -->
    <footer>
        <p>© Fut Store - Todos os direitos reservados</p>
    </footer>

    <!-- SCRIPT DE PAGINAÇÃO -->
    <script>
        let listaProdutos = [];
        let limite = 8; // Quantos produtos por página
        let paginaAtual = 1;

        // Carregando o JSON do backend (um array simples)
        fetch("http://localhost:3000/produtos")
            .then(res => res.json())
            .then(data => {
                listaProdutos = data;
                carregarPagina(1);
            })
            .catch(err => console.error("Erro ao carregar JSON:", err));


        // ==========================
        //       MOSTRAR PRODUTOS
        // ==========================

        function carregarPagina(pagina) {
            paginaAtual = pagina;

            const start = (pagina - 1) * limite;
            const end = start + limite;

            const produtosPagina = listaProdutos.slice(start, end);

            mostrarProdutos(produtosPagina);
            criarPaginacao();
        }


        function mostrarProdutos(produtos) {
            const container = document.getElementById("lista-produtos");
            container.innerHTML = "";

            produtos.forEach(produto => {
                container.innerHTML += `
                    <div class="col-md-3 mb-4">
                        <div class="card h-100 shadow-sm">

                            <img src="${produto.imagens[0]}" class="card-img-top" alt="${produto.nome}">

                            <div class="card-body">
                                <h5 class="card-title">${produto.nome}</h5>
                                <p class="card-text">${produto.descricao}</p>
                                <p class="fw-bold text-success">R$ ${produto.preco}</p>

                                <div class="d-flex gap-2 mt-3">
                                    <a href="produto.html?id=${produto.id}" class="btn btn-primary w-50">Ver</a>
                                    <button class="btn btn-success w-50">Comprar</button>
                                </div>
                            </div>

                        </div>
                    </div>
                `;
            });
        }


        // ==========================
        //         PAGINAÇÃO
        // ==========================

        function criarPaginacao() {
            const totalPaginas = Math.ceil(listaProdutos.length / limite);
            const container = document.getElementById("paginacao");

            let html = `<ul class="pagination">`;

            // Botão "Anterior"
            html += `
                <li class="page-item ${paginaAtual === 1 ? "disabled" : ""}">
                    <button class="page-link" onclick="carregarPagina(${paginaAtual - 1})">Anterior</button>
                </li>
            `;

            // Botões numerados
            for (let i = 1; i <= totalPaginas; i++) {
                html += `
                    <li class="page-item ${i === paginaAtual ? "active" : ""}">
                        <button class="page-link" onclick="carregarPagina(${i})">${i}</button>
                    </li>
                `;
            }

            // Botão "Próxima"
            html += `
                <li class="page-item ${paginaAtual === totalPaginas ? "disabled" : ""}">
                    <button class="page-link" onclick="carregarPagina(${paginaAtual + 1})">Próxima</button>
                </li>
            `;

            html += `</ul>`;
            container.innerHTML = html;
        }
    </script>

</body>
</html>
