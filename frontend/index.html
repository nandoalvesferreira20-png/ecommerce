<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Fut Store</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- ICONS -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >

</head>

<body>

    <!-- BG EFFECT -->
    <div class="bg-effect"></div>

    <!-- ===================================================== -->
    <!-- ======================= NAVBAR ====================== -->
    <!-- ===================================================== -->

    <header>

        <nav class="navbar">

            <!-- LOGO -->
            <h2 class="logo">
                Fut Store
            </h2>

            <!-- MENU -->
            <ul class="menu">

                <li>
                    <a href="index.html">
                        Home
                    </a>
                </li>

                <li>
                    <a href="produto.html">
                        Produtos
                    </a>
                </li>

                <li>
                    <a href="cadastro.html">
                        Cadastro
                    </a>
                </li>

                <!-- USER -->
                <li id="areaUsuario">

                    <a href="login.html">
                        <i class="fa-solid fa-user"></i>
                    </a>

                </li>

                <!-- CARRINHO -->
                <li>

                    <a href="/carrinho">
                        <i class="fa-solid fa-cart-shopping"></i>
                    </a>

                </li>

            </ul>

        </nav>

    </header>

    <!-- ===================================================== -->
    <!-- ======================== HERO ======================= -->
    <!-- ===================================================== -->

    <section class="hero">

        <div class="hero-content">

            <span class="badge">
                Nova coleção 2026
            </span>

            <h1>
                A maior loja de futebol do Brasil
            </h1>

            <p>
                Camisas oficiais, chuteiras profissionais
                e acessórios premium para quem vive futebol.
            </p>

            <!-- SEARCH -->
            <div class="search-box">

                <i class="fa-solid fa-magnifying-glass"></i>

                <input
                    type="text"
                    placeholder="Pesquisar produtos..."
                >

            </div>

        </div>

    </section>

    <!-- ===================================================== -->
    <!-- ======================== MAIN ======================= -->
    <!-- ===================================================== -->

    <main>

        <!-- TITLE -->
        <div class="title-area">

            <h1 class="titulo-produtos">
                Produtos em destaque
            </h1>

        </div>

        <!-- ===================================================== -->
        <!-- ======================= FILTROS ===================== -->
        <!-- ===================================================== -->

        <div class="filtros">

            <button onclick="filtrarCategoria('todos')">
                Todos
            </button>

            <button onclick="filtrarCategoria('camisetas')">
                Camisetas
            </button>

            <button onclick="filtrarCategoria('chuteiras')">
                Chuteiras
            </button>

            <button onclick="filtrarCategoria('acessorios')">
                Acessórios
            </button>

            <button onclick="filtrarCategoria('promocoes')">
                Promoções
            </button>

        </div>

        <!-- ===================================================== -->
        <!-- ===================== CARROSSEL ===================== -->
        <!-- ===================================================== -->

        <div class="carrossel-container">

            <!-- LEFT -->
            <button class="seta" id="btn-esquerda">

                <i class="fa-solid fa-chevron-left"></i>

            </button>

            <!-- PRODUTOS -->
            <section id="produtos">

                <!-- JS -->

            </section>

            <!-- RIGHT -->
            <button class="seta" id="btn-direita">

                <i class="fa-solid fa-chevron-right"></i>

            </button>

        </div>

    </main>

    <!-- ===================================================== -->
    <!-- ======================= FOOTER ====================== -->
    <!-- ===================================================== -->

    <footer>

        <p>
            © Fut Store - Todos os direitos reservados
        </p>

    </footer>

</body>

</html>

    <!-- SCRIPT -->
    <script>

        // =========================
        // USUÁRIO LOGADO
        // =========================

        const usuario =
          JSON.parse(
            localStorage.getItem("usuarioLogado")
          );


        const areaUsuario =
          document.getElementById("areaUsuario");


        if (usuario) {

          areaUsuario.innerHTML = `

            <div style="
              display:flex;
              align-items:center;
              gap:10px;
            ">

              <span style="
                color:white;
                font-size:14px;
              ">
                Olá, ${usuario.nome}
              </span>

              <button
                onclick="logout()"
                style="
                  padding:6px 12px;
                  border:none;
                  border-radius:8px;
                  cursor:pointer;
                "
              >
                Sair
              </button>

            </div>

          `;
        }


        function logout() {

          localStorage.removeItem(
            "usuarioLogado"
          );

          window.location.reload();
        }



        // =========================
        // PRODUTOS
        // =========================

        let listaProdutos = [];


        fetch("http://localhost:3000/produtos")

        .then(res => res.json())

        .then(produtos => {

            listaProdutos = produtos;

            mostrarProdutos(listaProdutos);

        });


        function mostrarProdutos(produtos) {

            const container =
              document.getElementById("produtos");

            container.innerHTML = "";


            produtos.forEach(produto => {

                container.innerHTML += `
                
                <div class="card-produto">

                    <img
                      src="${produto.imagem}"
                      alt="${produto.nome}"
                    >

                    <h3>${produto.nome}</h3>

                    <p>R$ ${produto.preco}</p>

                    <a href="produto.html?id=${produto.id}">

                        <button>
                            Ver Produto
                        </button>

                    </a>

                </div>

                `;
            });
        }


        function filtrarCategoria(categoria) {

            if (categoria === "todos") {

                mostrarProdutos(listaProdutos);

                return;
            }


            const produtosFiltrados =
              listaProdutos.filter(produto =>

                produto.categoria &&

                produto.categoria
                  .trim()
                  .toLowerCase() === categoria

              );


            mostrarProdutos(produtosFiltrados);
        }



        // =========================
        // CARROSSEL
        // =========================

        const produtosContainer =
          document.getElementById("produtos");


        document
          .getElementById("btn-direita")

          .addEventListener("click", () => {

            produtosContainer.scrollBy({

                left: 300,

                behavior: "smooth"
            });
        });


        document
          .getElementById("btn-esquerda")

          .addEventListener("click", () => {

            produtosContainer.scrollBy({

                left: -300,

                behavior: "smooth"
            });
        });

    </script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>

</html>
