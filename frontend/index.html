<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fut Store</title>

    <link rel="stylesheet" href="css/style.css">

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >
</head>

<body>

    <div class="bg-effect"></div>

    <header>
        <nav class="navbar">

            <h2 class="logo">Fut Store</h2>

            <ul class="menu">
                <li>
                    <a href="index.html">Home</a>
                </li>

                <li>
                    <a href="produto.html">
                        Produtos
                    </a>
                </li>

                <li>
                    <a href="cadastro.html">Cadastro</a>
                </li>

                <li id="areaUsuario">
                    <a href="login.html">
                        <i class="fa-solid fa-user"></i>
                    </a>
                </li>

                <li>
                    <a href="/carrinho">
                        <i class="fa-solid fa-cart-shopping"></i>
                    </a>
                </li>

<li>
    <button id="toggle-theme" class="theme-btn">
        <i class="fa-solid fa-moon"></i>
    </button>
    </li>            </ul>

        </nav>
    </header>

    <section class="hero">

        <div class="hero-content">

            <span class="badge">
                Nova coleção 2026
            </span>

            <h1>
                A maior loja de futebol do Brasil
            </h1>

            <p>
                Camisas oficiais, chuteiras profissionais
                e acessórios premium para quem vive futebol.
            </p>

            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>

                <input
                    type="text"
                    id="pesquisaProdutos"
                    placeholder="Pesquisar produtos..."
                >
            </div>

        </div>

    </section>

    <main>

        <div class="title-area">
            <h1 class="titulo-produtos">
                Produtos em destaque
            </h1>
        </div>

        <div class="filtros">

            <button onclick="filtrarCategoria('todos')">
                Todos
            </button>

            <button onclick="filtrarCategoria('camisetas')">
                Camisetas
            </button>

            <button onclick="filtrarCategoria('chuteiras')">
                Chuteiras
            </button>

            <button onclick="filtrarCategoria('acessorios')">
                Acessórios
            </button>

            <button onclick="filtrarCategoria('promocoes')">
                Promoções
            </button>

        </div>

        <div class="carrossel-container">

            <button class="seta" id="btn-esquerda">
                <i class="fa-solid fa-chevron-left"></i>
            </button>

            <section id="produtos">
                <!-- Produtos aparecem aqui pelo JS -->
            </section>

            <button class="seta" id="btn-direita">
                <i class="fa-solid fa-chevron-right"></i>
            </button>

        </div>

    </main>

    <footer>
        <p>
            © Fut Store - Todos os direitos reservados
        </p>
    </footer>

    <script>
    

const toggleBtn = document.getElementById('toggle-theme');

toggleBtn.addEventListener('click', () => {

    document.body.classList.toggle('light-mode');

    const icon = toggleBtn.querySelector('i');

    if(document.body.classList.contains('light-mode')){
        icon.classList.remove('fa-moon');
        icon.classList.add('fa-sun');

        localStorage.setItem('theme', 'light');
    }

    else{
        icon.classList.remove('fa-sun');
        icon.classList.add('fa-moon');

        localStorage.setItem('theme', 'dark');
    }

});

/* SALVAR TEMA */

window.addEventListener('load', () => {

    const savedTheme = localStorage.getItem('theme');

    if(savedTheme === 'light'){

        document.body.classList.add('light-mode');

        const icon = toggleBtn.querySelector('i');

        icon.classList.remove('fa-moon');
        icon.classList.add('fa-sun');
    }

});



        // =========================
        // USUÁRIO LOGADO
        // =========================

        const usuario =
            JSON.parse(
                localStorage.getItem("usuarioLogado")
            );

        const areaUsuario =
            document.getElementById("areaUsuario");

        if (usuario) {

            areaUsuario.innerHTML = `

                <div style="
                    display:flex;
                    align-items:center;
                    gap:10px;
                ">

                    <span style="
                        color:white;
                        font-size:14px;
                    ">
                        Olá, ${usuario.nome}
                    </span>

                    <button
                        onclick="logout()"
                        style="
                            padding:6px 12px;
                            border:none;
                            border-radius:8px;
                            cursor:pointer;
                        "
                    >
                        Sair
                    </button>

                </div>
            `;
        }

        function logout() {

            localStorage.removeItem("usuarioLogado");

            window.location.reload();
        }


        // =========================
        // PRODUTOS
        // =========================

        let listaProdutos = [];

        fetch("http://localhost:3000/produtos")

            .then(res => res.json())

            .then(produtos => {

                listaProdutos = produtos;

                mostrarProdutos(listaProdutos);

            })

            .catch(erro => {

                console.log("Erro ao carregar produtos:", erro);

            });


        function mostrarProdutos(produtos) {

            const container =
                document.getElementById("produtos");

            container.innerHTML = "";

            produtos.forEach((produto, index) => {

                container.innerHTML += `

                    <div class="card-produto">

                        <img
                            src="${produto.imagem}"
                            alt="${produto.nome}"
                        >

                        <h3>${produto.nome}</h3>

                        <p>R$ ${produto.preco}</p>

                        <a href="produto.html?id=${produto.id ?? index}">

                            <button>
                                Ver Produto
                            </button>

                        </a>

                    </div>
                `;
            });
        }


        // =========================
        // FILTRO POR CATEGORIA
        // =========================

        function filtrarCategoria(categoria) {

            const campoPesquisa =
                document.getElementById("pesquisaProdutos");

            campoPesquisa.value = "";

            if (categoria === "todos") {

                mostrarProdutos(listaProdutos);

                return;
            }

            const produtosFiltrados =
                listaProdutos.filter(produto =>

                    produto.categoria &&

                    produto.categoria
                        .trim()
                        .toLowerCase() === categoria

                );

            mostrarProdutos(produtosFiltrados);
        }


        // =========================
        // PESQUISA
        // =========================

        const campoPesquisa =
            document.getElementById("pesquisaProdutos");

        campoPesquisa.addEventListener("input", () => {

            const textoDigitado =
                campoPesquisa.value
                    .trim()
                    .toLowerCase();

            const produtosFiltrados =
                listaProdutos.filter(produto =>

                    produto.nome &&
                    produto.nome
                        .toLowerCase()
                        .includes(textoDigitado)

                );

            mostrarProdutos(produtosFiltrados);
        });


        // =========================
        // CARROSSEL
        // =========================

        const produtosContainer =
            document.getElementById("produtos");

        document
            .getElementById("btn-direita")
            .addEventListener("click", () => {

                produtosContainer.scrollBy({
                    left: 300,
                    behavior: "smooth"
                });

            });

        document
            .getElementById("btn-esquerda")
            .addEventListener("click", () => {

                produtosContainer.scrollBy({
                    left: -300,
                    behavior: "smooth"
                });

            });

    </script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>

</html>
