<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedbacks - Fut Store</title>

  <link rel="stylesheet" href="css/feedback.css">

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  >
</head>

<body>

  <div class="bg-effect"></div>

  <header>

    <nav class="navbar">

      <h2 class="logo">Fut Store</h2>

      <ul class="menu">

        <li>
          <a href="index.html">Home</a>
        </li>

        <li>
          <a href="index.html#produtos">Produtos</a>
        </li>

        <li>
          <a href="feedbacks.html">Feedbacks</a>
        </li>

        <li>
          <a href="cadastro.html">Cadastro</a>
        </li>

        <li>
          <a href="login.html">
            <i class="fa-solid fa-user"></i>
          </a>
        </li>

        <li>
          <a href="/carrinho">
            <i class="fa-solid fa-cart-shopping"></i>
          </a>
        </li>

      </ul>

    </nav>

  </header>

  <main class="feedback-page">

    <!-- HERO -->

    <section class="feedback-hero">

      <span class="badge">
        Avaliações dos clientes
      </span>

      <h1>
        O que estão falando da Fut Store
      </h1>

      <p>
        Veja alguns feedbacks de clientes que compraram camisas,
        chuteiras e acessórios em nossa loja.
      </p>

    </section>

    <!-- FEEDBACKS -->

    <section
      class="feedback-container"
      id="listaFeedbacks"
    >

      <!-- FEEDBACKS VIA JS -->

    </section>

    <!-- FORM -->

    <section class="form-feedback">

      <h2>
        Deixe seu feedback
      </h2>

      <form id="formFeedback">

        <input
          type="text"
          id="nome"
          placeholder="Seu nome"
          required
        >

        <select
          id="avaliacao"
          required
        >

          <option value="">
            Escolha sua avaliação
          </option>

          <option value="5">
            ★★★★★ - Excelente
          </option>

          <option value="4">
            ★★★★☆ - Muito bom
          </option>

          <option value="3">
            ★★★☆☆ - Bom
          </option>

          <option value="2">
            ★★☆☆☆ - Regular
          </option>

          <option value="1">
            ★☆☆☆☆ - Ruim
          </option>

        </select>

        <textarea
          id="mensagem"
          placeholder="Escreva seu feedback..."
          required
        ></textarea>

        <button type="submit">
          Enviar Feedback
        </button>

      </form>

    </section>

  </main>

  <footer>

    <p>
      © Fut Store - Todos os direitos reservados
    </p>

  </footer>

  <script>

    // =========================
    // LISTAR FEEDBACKS
    // =========================

    async function carregarFeedbacks() {

      try {

        const resposta =
          await fetch("http://localhost:3000/feedbacks");

        const feedbacks =
          await resposta.json();

        const container =
          document.getElementById("listaFeedbacks");

        container.innerHTML = "";

        feedbacks.reverse().forEach(feedback => {

          let estrelas = "";

          for (
            let i = 0;
            i < Number(feedback.avaliacao);
            i++
          ) {
            estrelas += "★";
          }

          for (
            let i = Number(feedback.avaliacao);
            i < 5;
            i++
          ) {
            estrelas += "☆";
          }

          container.innerHTML += `

            <div class="feedback-card">

              <div class="stars">
                ${estrelas}
              </div>

              <p>
                "${feedback.mensagem}"
              </p>

              <h3>
                ${feedback.nome}
              </h3>

              <span>
                ${feedback.data}
              </span>

            </div>

          `;
        });

      } catch (erro) {

        console.log(
          "Erro ao carregar feedbacks:",
          erro
        );
      }
    }

    carregarFeedbacks();


    // =========================
    // ENVIAR FEEDBACK
    // =========================

    const formFeedback =
      document.getElementById("formFeedback");

    formFeedback.addEventListener(
      "submit",
      async (event) => {

        event.preventDefault();

        const nome =
          document.getElementById("nome").value;

        const avaliacao =
          document.getElementById("avaliacao").value;

        const mensagem =
          document.getElementById("mensagem").value;

        try {

          const resposta =
            await fetch(
              "http://localhost:3000/feedbacks",
              {
                method: "POST",

                headers: {
                  "Content-Type":
                    "application/json"
                },

                body: JSON.stringify({
                  nome,
                  avaliacao,
                  mensagem
                })
              }
            );

          const dados =
            await resposta.json();

          if (!resposta.ok) {

            alert(dados.erro);

            return;
          }

          alert(dados.mensagem);

          formFeedback.reset();

          carregarFeedbacks();

        } catch (erro) {

          console.log(
            "Erro ao enviar feedback:",
            erro
          );

          alert(
            "Erro ao enviar feedback."
          );
        }
      }
    );

  </script>

</body>
</html>
